steps:
  # ── 1. Build images in parallel ──────────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/autopartage/backend:$_COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/autopartage/backend:latest
      - ./backend
    waitFor: ['-']

  - id: get-backend-url
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services describe autopartage-backend --region=${_REGION} --format='value(status.url)' > backend_url.txt || echo "https://autopartage-backend-CHANGE_ME.a.run.app" > backend_url.txt
    waitFor: ['-']

  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    entrypoint: /bin/bash
    args:
      - -c
      - BACKEND_URL=$$(cat backend_url.txt) &&
        docker build
          --build-arg NEXT_PUBLIC_API_URL=$$BACKEND_URL
          --build-arg NEXT_PUBLIC_BUILD_CMD="npx next build"
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/autopartage/frontend:$_COMMIT_SHA
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/autopartage/frontend:latest
          ./frontend
    waitFor: [get-backend-url]

  # ── 2. Push images ────────────────────────────────────────────────────────────
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/autopartage/backend
    waitFor: [build-backend]

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/autopartage/frontend
    waitFor: [build-frontend]

  # ── 3. Deploy backend to Cloud Run ────────────────────────────────────────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - autopartage-backend
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/autopartage/backend:$_COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --add-cloudsql-instances=$PROJECT_ID:${_REGION}:autopartage-db
      - --service-account=autopartage-backend@$PROJECT_ID.iam.gserviceaccount.com
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_ACCESS_SECRET=JWT_ACCESS_SECRET:latest,JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest
      - --set-env-vars=NODE_ENV=production,FRONTEND_ORIGIN=${_FRONTEND_ORIGIN}
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=100
      - --allow-unauthenticated
      - --quiet
    waitFor: [push-backend]

  # ── 4. Deploy frontend to Cloud Run (uses resolved backend URL) ───────────────
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        BACKEND_URL=$(gcloud run services describe autopartage-backend --region=${_REGION} --format='value(status.url)')
        echo "Backend URL: $$BACKEND_URL"
        gcloud run deploy autopartage-frontend --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/autopartage/frontend:$_COMMIT_SHA --region=${_REGION} --platform=managed --service-account=autopartage-frontend@$PROJECT_ID.iam.gserviceaccount.com --set-env-vars="NODE_ENV=production,NEXT_PUBLIC_API_URL=$$BACKEND_URL" --memory=512Mi --cpu=1 --min-instances=0 --max-instances=10 --concurrency=50 --allow-unauthenticated --quiet
    waitFor: [push-frontend, deploy-backend]

  # ── 5. Smoke tests ────────────────────────────────────────────────────────────
  - id: smoke-test
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        BACKEND_URL=$(gcloud run services describe autopartage-backend --region=${_REGION} --format='value(status.url)')
        FRONTEND_URL=$(gcloud run services describe autopartage-frontend --region=${_REGION} --format='value(status.url)')

        _wait_for_200() {
          local URL="$$1"
          local NAME="$$2"
          local MAX_RETRIES=10
          local RETRY_INTERVAL=10
          for i in $$(seq 1 $$MAX_RETRIES); do
            HTTP_CODE=$$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 "$$URL" 2>/dev/null || echo "000")
            if [ "$$HTTP_CODE" = "200" ]; then
              echo "  $$NAME OK (attempt $$i)"
              return 0
            fi
            echo "  $$NAME not ready yet ($$HTTP_CODE) — retrying in $$RETRY_INTERVAL s ($$i/$$MAX_RETRIES)..."
            sleep $$RETRY_INTERVAL
          done
          echo "ERROR: $$NAME did not become healthy after $$(( MAX_RETRIES * RETRY_INTERVAL ))s"
          return 1
        }

        echo "Smoke-testing backend at $$BACKEND_URL/health ..."
        _wait_for_200 "$$BACKEND_URL/health" "backend"

        echo "Smoke-testing frontend at $$FRONTEND_URL ..."
        _wait_for_200 "$$FRONTEND_URL" "frontend"

        echo "All smoke tests passed."
    waitFor: [deploy-frontend]

substitutions:
  _REGION: europe-west1
  _COMMIT_SHA: manual
  # Set this to your actual frontend Cloud Run URL after the first deployment.
  # On the very first deployment, leave empty; update the Cloud Build trigger
  # variable once you know the URL (gcloud run services describe autopartage-frontend).
  _FRONTEND_ORIGIN: https://autopartage-frontend-19378503105.europe-west1.run.app

options:
  logging: CLOUD_LOGGING_ONLY
