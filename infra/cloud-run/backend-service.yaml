apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: autopartage-backend
spec:
  template:
    spec:
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/autopartage/backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL
                  key: latest
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: JWT_ACCESS_SECRET
                  key: latest
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: JWT_REFRESH_SECRET
                  key: latest
