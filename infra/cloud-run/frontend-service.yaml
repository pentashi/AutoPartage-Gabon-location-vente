apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: autopartage-frontend
spec:
  template:
    spec:
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/autopartage/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              value: https://autopartage-backend-xxxx.run.app
