steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_BACKEND_IMAGE}", "./backend"]
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_FRONTEND_IMAGE}", "./frontend"]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_BACKEND_IMAGE}"]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_FRONTEND_IMAGE}"]
substitutions:
  _BACKEND_IMAGE: REGION-docker.pkg.dev/PROJECT_ID/autopartage/backend:latest
  _FRONTEND_IMAGE: REGION-docker.pkg.dev/PROJECT_ID/autopartage/frontend:latest
