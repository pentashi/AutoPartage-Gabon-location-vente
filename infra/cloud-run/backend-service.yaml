apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: autopartage-backend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Connect to Cloud SQL instance via Unix socket
        run.googleapis.com/cloudsql-instances: PROJECT_ID:REGION:autopartage-db
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      serviceAccountName: autopartage-backend@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 100
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/autopartage/backend:latest
          ports:
            - containerPort: 4000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: FRONTEND_ORIGIN
              value: https://autopartage-frontend-CHANGE_ME.a.run.app
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL
                  key: latest
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: JWT_ACCESS_SECRET
                  key: latest
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: JWT_REFRESH_SECRET
                  key: latest
          livenessProbe:
            httpGet:
              path: /health
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
            initialDelaySeconds: 10
            periodSeconds: 10

