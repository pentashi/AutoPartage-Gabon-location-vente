services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: autopartage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - autopartage_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autopartage
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 7d
      FRONTEND_ORIGIN: http://localhost:3000
    depends_on:
      - postgres
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  autopartage_pgdata:
